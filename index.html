<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#000;
    overflow:hidden;
    color:#ff4da6;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🔐 PASSWORD */
#lockScreen{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:200;
}

#lockScreen h2{
    margin-bottom:20px;
    text-shadow:0 0 10px #ff4da6;
}

#passwordInput{
    padding:10px;
    border:none;
    border-radius:5px;
    text-align:center;
}

#unlockBtn{
    margin-top:10px;
    padding:8px 20px;
    border:none;
    background:#ff4da6;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

#error{
    margin-top:10px;
    font-size:14px;
}

/* 🎵 TAP */
#overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
    cursor:pointer;
}

#overlay h2{
    text-shadow:0 0 10px #ff4da6;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:0.5;}
    50%{opacity:1;}
    100%{opacity:0.5;}
}

/* 💘 HEARTS */
.heart{
    position:absolute;
    top:-10px;
    color:#ff2e88;
    animation:fall linear infinite;
    opacity:0.6;
    z-index:0;
}

@keyframes fall{
    to{transform:translateY(110vh);opacity:0;}
}

/* ✨ TEXT */
.container{
    text-align:center;
    width:85%;
    z-index:10;
}

#poem{
    font-size:30px;
    transition:all 1s ease;
    text-shadow:
        0 0 6px #ff4da6,
        0 0 12px #ff2e88,
        0 0 25px #ff2e88;
}

/* 💥 FINAL MESSAGE */
#finalMessage{
    position:absolute;
    font-size:40px;
    text-align:center;
    opacity:0;
    transform:scale(0.5);
    color:#ff4da6;
    text-shadow:
        0 0 10px #ff4da6,
        0 0 30px #ff2e88,
        0 0 60px #ff2e88;
    transition:all 1.5s ease;
}

.showFinal{
    opacity:1 !important;
    transform:scale(1.2) !important;
}
</style>
</head>

<body>

<div id="lockScreen">
    <h2>Enter Password 💖</h2>
    <input type="password" id="passwordInput">
    <button id="unlockBtn">Unlock</button>
    <div id="error"></div>
</div>

<div id="overlay">
    <h2>TAP TO START 💖</h2>
</div>

<audio id="music" loop preload="auto">
    <source src="poembgmusic.mpeg" type="audio/mpeg">
</audio>

<div class="container">
    <div id="poem"></div>
</div>

<div id="finalMessage">I LOVE YOU ICCHA 💖</div>

<script>

const correctPassword = "youaremine";

document.getElementById("unlockBtn").onclick = () => {
    const input = document.getElementById("passwordInput").value.toLowerCase();

    if(input === correctPassword){
        lockScreen.style.display="none";
        overlay.style.display="flex";
    } else {
        document.getElementById("error").innerText="Hmm… wrong secret 😏💖";
    }
};

function createHearts(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💖";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*25)+"px";
    heart.style.animationDuration=(5+Math.random()*4)+"s";

    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),9000);
}

const poemLines = [
"kaise bataoon main tumhe 💖",
"mere liye tum kaun ho ✨",
"kaise bataoon main tumhe...",
"tum dhadkanon ka geet ho ❤️",
"jeevan ka tum sangeet ho 🎶",
"tum zindagi...",
"Tum bandagi...",
"Tum roshni ✨",
"Tum taazgi 🌸",
"tum har khushi 😊",
"tum pyaar ho, tum preet ho 💕",
"manmeet ho ❤️",
"aankhon mein tum 👀",
"yaadon mein tum 💭",
"saanson mein tum 💫",
"aahon mein tum...",
"neendon mein tum 😴",
"khwaabon mein tum 🌙",
"Tum ho meri har baat me 💖",
"tum ho mere din raat me ☀️🌙",
"tum subah mein 🌅",
"Tum shaam me 🌇",
"Tum soch me 🤍",
"Tum kaam me 💼",
"Mere liye paana bhi tum",
"Khona bhi tum",
"Mere liye hasna bhi tum 😊",
"Mere liye rona bhi tum 😢",
"Aur jaagna sona bhi tum 🌙",
"Jaau kahi...",
"Dekhu kahi...",
"Tum ho waha ❤️",
"Tum ho wahi ❤️",
"Tum bin to mai kuch bhi nhi 💔",
"Mera sab kuch ho tum 💖"
];

let index=0;
const poemDiv=document.getElementById("poem");
const finalMessage=document.getElementById("finalMessage");
const music=document.getElementById("music");

function showNextLine(){
    if(index < poemLines.length){
        poemDiv.innerText = poemLines[index];
        index++;
    } else {
        clearInterval(poemInterval);
        poemDiv.style.display="none";

        // 💥 FINAL EFFECT
        finalMessage.classList.add("showFinal");

        // 💘 Extra hearts burst
        for(let i=0;i<30;i++){
            setTimeout(createHearts, i*100);
        }
    }
}

let poemInterval;

document.getElementById("overlay").addEventListener("click", () => {
    document.getElementById("overlay").style.display="none";

    music.play().catch(()=>{});

    setInterval(createHearts, 280);

    poemDiv.innerText = poemLines[0];
    index = 1;

    poemInterval = setInterval(showNextLine, 3500);
});

</script>

</body>
</html>
